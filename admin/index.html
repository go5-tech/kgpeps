<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Peptide Central</title>
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}
/* Gate */
#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem}
#gate h1{font-size:1.5rem;font-weight:900;color:#1d4ed8}
#gate input{padding:.75rem 1rem;border:1.5px solid #cbd5e1;border-radius:10px;font-size:1rem;width:280px;outline:none}
#gate input:focus{border-color:#1d4ed8}
#gate button{padding:.75rem 2rem;background:#1d4ed8;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
#gate button:hover{background:#1e40af}
#gate .err{color:#dc2626;font-size:.85rem}
/* Panel */
#panel{display:none;min-height:100vh}
.adm-hd{background:#fff;border-bottom:1px solid #e2e8f0;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.adm-hd h1{font-size:1.1rem;font-weight:900;color:#1d4ed8;flex:1}
.adm-hd .status{font-size:.8rem;color:#64748b}
.btn{padding:.55rem 1.2rem;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-primary{background:#1d4ed8;color:#fff}.btn-primary:hover{background:#1e40af}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}.btn-ghost:hover{background:#e2e8f0}
.btn-sm{padding:.35rem .8rem;font-size:.75rem}
.btn-warn{background:#f59e0b;color:#fff}.btn-warn:hover{background:#d97706}
/* Best Sellers section */
.bs-section{margin:0 1.5rem .75rem;background:#fff;border:1.5px solid #fde68a;border-radius:14px;padding:1rem}
.bs-section h2{font-size:.85rem;font-weight:900;color:#d97706;text-transform:uppercase;letter-spacing:.4px;margin-bottom:.75rem}
.bs-grid{display:flex;flex-wrap:wrap;gap:.5rem}
.bs-chip{display:flex;align-items:center;gap:.4rem;padding:.35rem .7rem;border-radius:20px;font-size:.8rem;font-weight:700;background:#fef3c7;color:#92400e;border:1.5px solid #fde68a;cursor:grab;user-select:none}
.bs-chip.dragging{opacity:.4;border-style:dashed}
.bs-chip.drag-over{border-color:#d97706;border-width:2px}
.bs-chip button{background:none;border:none;cursor:pointer;color:#dc2626;font-size:.9rem;line-height:1;padding:0}
.bs-add{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap;align-items:center}
.bs-add select{padding:.35rem .7rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.82rem;outline:none}
/* Drag handle */
.drag-handle{cursor:grab;color:#94a3b8;font-size:1.2rem;flex-shrink:0;padding:0 6px;line-height:1;user-select:none;touch-action:none}
.drag-handle:hover{color:#475569}
.sortable-ghost{opacity:.3;background:#eff6ff !important}
.sortable-chosen{box-shadow:0 8px 30px rgba(29,78,216,.15);border-color:#1d4ed8 !important}
/* Search */
.adm-bar{padding:1rem 1.5rem;display:flex;gap:.75rem;align-items:center}
.adm-bar input{flex:1;padding:.6rem 1rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none;max-width:360px}
.adm-bar input:focus{border-color:#1d4ed8}
/* Product list */
.prod-list{padding:0 1.5rem 2rem;display:flex;flex-direction:column;gap:.75rem}
/* Product card */
.prod-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;transition:.2s}
.prod-card.inactive{opacity:.55}
.prod-card.expanded{border-color:#1d4ed8}
.prod-hd{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;cursor:pointer;user-select:none}
.prod-hd:hover{background:#f8fafc}
.prod-thumb{width:48px;height:48px;object-fit:contain;border-radius:8px;background:#f1f5f9;flex-shrink:0;border:1px solid #e2e8f0}
.prod-thumb-placeholder{width:48px;height:48px;border-radius:8px;background:#e2e8f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#94a3b8;text-align:center;line-height:1.2}
.prod-info{flex:1;min-width:0}
.prod-info .pname{font-weight:800;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-info .pmeta{font-size:.75rem;color:#64748b;margin-top:.15rem}
.prod-badges{display:flex;gap:.35rem;flex-wrap:wrap}
.badge{font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:20px;text-transform:uppercase}
.badge-sale{background:#fee2e2;color:#dc2626}
.badge-new{background:#dcfce7;color:#16a34a}
.badge-top{background:#fef3c7;color:#d97706}
.toggle-wrap{display:flex;align-items:center;gap:.4rem;font-size:.8rem;font-weight:600;color:#475569;flex-shrink:0}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:20px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:#1d4ed8}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}
.chevron{font-size:.7rem;color:#94a3b8;flex-shrink:0;transition:.2s}
.prod-card.expanded .chevron{transform:rotate(180deg)}
/* Edit body */
.prod-body{display:none;padding:1rem;border-top:1px solid #f1f5f9;background:#fafbfc}
.prod-card.expanded .prod-body{display:block}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.field{display:flex;flex-direction:column;gap:.3rem}
.field label{font-size:.75rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{padding:.5rem .75rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.85rem;outline:none;font-family:inherit;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1d4ed8}
.field textarea{resize:vertical;min-height:70px}
.img-row{display:flex;gap:.5rem;align-items:center}
.img-row input{flex:1}
.img-preview{width:56px;height:56px;object-fit:contain;border-radius:8px;background:#f1f5f9;border:1px solid #e2e8f0;flex-shrink:0}
.badges-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
.badge-check{display:flex;align-items:center;gap:.35rem;font-size:.82rem;font-weight:600;cursor:pointer}
.badge-check input{width:15px;height:15px;cursor:pointer}
/* Variants */
.var-section{margin-top:.75rem}
.var-section h3{font-size:.8rem;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.3px;margin-bottom:.5rem}
.var-table{width:100%;border-collapse:collapse;font-size:.82rem}
.var-table th{text-align:left;padding:.4rem .5rem;font-size:.7rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #e2e8f0}
.var-table td{padding:.4rem .5rem;vertical-align:middle}
.var-table tr:not(:last-child) td{border-bottom:1px solid #f1f5f9}
.var-table input[type=text],.var-table input[type=number]{width:100%;padding:.3rem .5rem;border:1px solid #e2e8f0;border-radius:6px;font-size:.82rem;outline:none}
.var-table input:focus{border-color:#1d4ed8}
.var-img-cell{display:flex;gap:.3rem;align-items:center}
.var-img-cell input{flex:1;min-width:0}
.var-img-thumb{width:30px;height:30px;object-fit:contain;border-radius:4px;background:#f1f5f9;border:1px solid #e2e8f0;flex-shrink:0}
.add-var-btn{margin-top:.5rem;font-size:.78rem}
.prod-actions{margin-top:.85rem;display:flex;gap:.5rem;justify-content:flex-end;flex-wrap:wrap}
/* Add product modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:900;margin-bottom:1rem;color:#0f172a}
.modal .field-row{grid-template-columns:1fr 1fr}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}
/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0f172a;color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:.85rem;font-weight:600;z-index:300;transform:translateY(100px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#16a34a}
.toast.err{background:#dc2626}
@media(max-width:600px){.field-row{grid-template-columns:1fr}.adm-hd{gap:.5rem}.adm-bar{flex-wrap:wrap}}
</style>
</head>
<body>

<!-- Password Gate -->
<div id="gate">
  <h1>Peptide Central Admin</h1>
  <input type="password" id="secret-input" placeholder="Enter admin secret" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Login</button>
  <span class="err" id="gate-err"></span>
</div>

<!-- Admin Panel -->
<div id="panel">
  <div class="adm-hd">
    <h1>Peptide Central Admin</h1>
    <span class="status" id="save-status"></span>
    <button class="btn btn-ghost btn-sm" onclick="reloadProducts()">↺ Reload</button>
    <button class="btn btn-ghost btn-sm" onclick="openChangePwd()">🔑 Change Password</button>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Product</button>
    <button class="btn btn-success" onclick="saveAll()">💾 Save All Changes</button>
  </div>
  <!-- Best Sellers Quick Manager -->
  <div class="bs-section" id="bs-section">
    <h2>⭐ Best Sellers (shown on homepage)</h2>
    <div class="bs-grid" id="bs-grid"></div>
    <div class="bs-add">
      <select id="bs-add-sel"></select>
      <button class="btn btn-warn btn-sm" onclick="addBestSeller()">+ Add Best Seller</button>
      <span style="font-size:.75rem;color:#94a3b8">Max 6 for even grid</span>
    </div>
  </div>

  <div class="adm-bar">
    <input type="text" id="search" placeholder="Search products…" oninput="renderList()">
    <span id="prod-count" style="font-size:.82rem;color:#64748b"></span>
  </div>
  <div class="prod-list" id="prod-list"></div>
</div>

<!-- Add Product Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Add New Product</h2>
    <div class="field-row">
      <div class="field"><label>Slug / ID</label><input type="text" id="new-id" placeholder="e.g. bpc-157"></div>
      <div class="field"><label>Name</label><input type="text" id="new-name" placeholder="e.g. BPC-157"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Category</label>
        <select id="new-cat">
          <option>Recovery</option><option>Fat Loss</option><option>Hormones</option>
          <option>Brain</option><option>Longevity</option><option>Blend</option>
        </select>
      </div>
      <div class="field"><label>Target</label><input type="text" id="new-tgt" placeholder="e.g. Wound Healing"></div>
    </div>
    <div class="field"><label>Description</label><textarea id="new-desc" rows="3"></textarea></div>
    <div class="field-row" style="margin-top:.75rem">
      <div class="field"><label>Dose</label><input type="text" id="new-dose" placeholder="e.g. 250mcg/day"></div>
      <div class="field"><label>Half-life</label><input type="text" id="new-half" placeholder="e.g. ~4h"></div>
    </div>
    <div style="margin-top:.75rem">
      <div class="field"><label>Image Path</label><input type="text" id="new-img" placeholder="/images/vials/product_10mg.png"></div>
    </div>
    <div style="margin-top:.5rem;font-size:.8rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.3px;margin-bottom:.3rem">First Variant</div>
    <div class="field-row">
      <div class="field"><label>Size</label><input type="text" id="new-vmg" placeholder="10mg"></div>
      <div class="field"><label>Price (₹)</label><input type="number" id="new-vprice" placeholder="4999"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Orig Price (₹)</label><input type="number" id="new-voprice" placeholder="7999"></div>
      <div class="field"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddProduct()">Add Product</button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal">
    <h2>Change Password</h2>
    <div class="field" style="margin-bottom:.75rem"><label>New Password</label><input type="password" id="new-pwd" placeholder="Min 8 characters"></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="confirm-pwd" placeholder="Repeat new password"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeChangePwd()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmChangePwd()">Update Password</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://kgpeps-admin.go5devesh73.workers.dev';
let products = [];
let secret = '';

async function login() {
  secret = document.getElementById('secret-input').value.trim();
  if (!secret) return;
  const errEl = document.getElementById('gate-err');
  errEl.textContent = '';
  try {
    // Validate secret against Worker first
    const ping = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({secret, action: 'ping'})
    });
    if (ping.status === 401) { errEl.textContent = 'Wrong password.'; secret = ''; return; }
    await loadProducts();
    sessionStorage.setItem('adm_s', secret);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
  } catch(e) {
    errEl.textContent = 'Failed to connect. Check your internet.';
  }
}

let _origImages = {};

async function loadProducts() {
  const res = await fetch('/products.json?t=' + Date.now());
  if (!res.ok) throw new Error('fetch failed');
  products = await res.json();
  // Snapshot images for change detection
  _origImages = {};
  products.forEach(p => {
    _origImages[p.id] = { img: p.img || '', variants: (p.variants||[]).map(v => v.img||'') };
  });
  renderList();
}

async function reloadProducts() {
  await loadProducts();
  toast('Reloaded from server', 'ok');
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q ? products.filter(p => p.name.toLowerCase().includes(q) || (p.cat||'').toLowerCase().includes(q)) : products;
  document.getElementById('prod-count').textContent = filtered.length + ' products';
  document.getElementById('prod-list').innerHTML = filtered.map((p) => {
    const realIdx = products.indexOf(p);
    return renderCard(p, realIdx);
  }).join('');
  renderBestSellers();
  setTimeout(initSortable, 0);
}

let bsSortable = null;

function renderBestSellers() {
  const bestSellers = products.filter(p => (p.badges||[]).includes('top'));
  document.getElementById('bs-grid').innerHTML = bestSellers.length
    ? bestSellers.map(p => {
        const i = products.indexOf(p);
        return `<div class="bs-chip" data-idx="${i}">⠿ ${esc(p.name)}<button onclick="event.stopPropagation();removeBestSeller(${i})" title="Remove">✕</button></div>`;
      }).join('')
    : '<span style="font-size:.8rem;color:#94a3b8">No best sellers set</span>';
  const sel = document.getElementById('bs-add-sel');
  const others = products.filter(p => !(p.badges||[]).includes('top') && p.active !== false);
  sel.innerHTML = others.map(p => `<option value="${products.indexOf(p)}">${esc(p.name)}</option>`).join('');
  // Init SortableJS on bs-grid
  if (bsSortable) { bsSortable.destroy(); bsSortable = null; }
  if (bestSellers.length > 1) {
    bsSortable = Sortable.create(document.getElementById('bs-grid'), {
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd(evt) {
        if (evt.oldIndex === evt.newIndex) return;
        const chips = [...document.querySelectorAll('#bs-grid .bs-chip')];
        const indices = chips.map(c => +c.dataset.idx);
        // Reorder just the best-seller items in the products array
        const bsItems = products.filter(p => (p.badges||[]).includes('top'));
        const reordered = indices.map(idx => products[idx]);
        // Replace best-seller positions in products with reordered
        let ri = 0;
        for (let j = 0; j < products.length; j++) {
          if ((products[j].badges||[]).includes('top')) products[j] = reordered[ri++];
        }
        renderList();
        markUnsaved();
      }
    });
  }
}

function addBestSeller() {
  const sel = document.getElementById('bs-add-sel');
  if (!sel.value && sel.value !== '0') return;
  const i = +sel.value;
  if (!products[i].badges) products[i].badges = [];
  if (!products[i].badges.includes('top')) products[i].badges.push('top');
  renderList();
  markUnsaved();
}

function removeBestSeller(i) {
  products[i].badges = (products[i].badges||[]).filter(b => b !== 'top');
  renderList();
  markUnsaved();
}

let prodSortable = null;

function initSortable() {
  const list = document.getElementById('prod-list');
  if (prodSortable) { prodSortable.destroy(); prodSortable = null; }
  prodSortable = Sortable.create(list, {
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd(evt) {
      if (evt.oldIndex === evt.newIndex) return;
      const moved = products.splice(evt.oldIndex, 1)[0];
      products.splice(evt.newIndex, 0, moved);
      renderList();
      markUnsaved();
    }
  });
}

function renderCard(p, i) {
  const active = p.active !== false;
  const badges = (p.badges || []);
  const badgeHtml = badges.map(b => `<span class="badge badge-${b}">${b}</span>`).join('');
  const imgSrc = p.img || '';
  const thumbHtml = imgSrc
    ? `<img class="prod-thumb" src="${imgSrc}" onerror="this.style.display='none'">`
    : `<div class="prod-thumb-placeholder">No Image</div>`;

  const varRows = (p.variants || []).map((v, vi) => `
    <tr>
      <td><input type="text" value="${esc(v.mg)}" oninput="setVar(${i},${vi},'mg',this.value)"></td>
      <td><input type="number" value="${v.price}" oninput="setVar(${i},${vi},'price',+this.value)"></td>
      <td><input type="number" value="${v.origPrice}" oninput="setVar(${i},${vi},'origPrice',+this.value)"></td>
      <td>
        <div class="var-img-cell">
          <input type="text" value="${esc(v.img||'')}" placeholder="/images/vials/…" oninput="setVar(${i},${vi},'img',this.value)" id="var-img-${i}-${vi}">
          ${v.img ? `<img class="var-img-thumb" src="${v.img}" id="var-thumb-${i}-${vi}">` : `<div class="var-img-thumb" id="var-thumb-${i}-${vi}"></div>`}
          <label class="btn btn-ghost btn-sm" style="cursor:pointer;white-space:nowrap">
            ↑ Upload
            <input type="file" accept="image/*" style="display:none" onchange="uploadVariantImg(event,${i},${vi})">
          </label>
        </div>
      </td>
      <td><button class="btn btn-danger btn-sm" onclick="removeVar(${i},${vi})">✕</button></td>
    </tr>`).join('');

  const isBestSeller = (p.badges||[]).includes('top');
  return `<div class="prod-card${active ? '' : ' inactive'}" id="card-${i}" data-idx="${i}">
    <div class="prod-hd" onclick="toggleCard(${i})">
      <span class="drag-handle" onclick="event.stopPropagation()" title="Drag to reorder">⠿</span>
      ${thumbHtml}
      <div class="prod-info">
        <div class="pname">${esc(p.name)}</div>
        <div class="pmeta">${esc(p.cat||'')} · ${(p.variants||[]).length} variant(s) · #${i+1}</div>
      </div>
      <div class="prod-badges">${badgeHtml}</div>
      <label class="toggle-wrap" onclick="event.stopPropagation()" title="Best Seller" style="color:${isBestSeller?'#d97706':'#94a3b8'}">
        <input type="checkbox" style="width:14px;height:14px;cursor:pointer" ${isBestSeller?'checked':''} onchange="toggleBadge(${i},'top',this.checked);renderBestSellers()">
        ⭐
      </label>
      <label class="toggle-wrap" onclick="event.stopPropagation()">
        <label class="toggle">
          <input type="checkbox" ${active?'checked':''} onchange="setActive(${i},this.checked)">
          <span class="toggle-slider"></span>
        </label>
        ${active ? 'Active' : 'Inactive'}
      </label>
      <span class="chevron">▼</span>
    </div>
    <div class="prod-body">
      <div class="field-row">
        <div class="field"><label>Name</label><input type="text" value="${esc(p.name)}" oninput="setField(${i},'name',this.value)"></div>
        <div class="field"><label>Category</label>
          <select onchange="setField(${i},'cat',this.value)">
            ${['Recovery','Fat Loss','Hormones','Brain','Longevity','Blend'].map(c=>`<option${p.cat===c?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Target</label><input type="text" value="${esc(p.tgt||'')}" oninput="setField(${i},'tgt',this.value)"></div>
        <div class="field"><label>Purity</label><input type="text" value="${esc(p.purity||'99%')}" oninput="setField(${i},'purity',this.value)"></div>
      </div>

async function compressImage(file, maxDim = 900) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxDim || h > maxDim) {
        if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      // White background for PNG→JPEG conversion
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      // Try PNG first; if > 700KB use JPEG
      let dataUrl = canvas.toDataURL('image/png');
      const pngSize = atob(dataUrl.split(',')[1]).length;
      if (pngSize > 700000) dataUrl = canvas.toDataURL('image/jpeg', 0.88);
      resolve(dataUrl);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function uploadFile(file, path) {
  toast('Compressing image…');
  const dataUrl = await compressImage(file);
  if (!dataUrl) { toast('Image load failed', 'err'); return null; }
  const base64 = dataUrl.split(',')[1];
  const sizeKB = Math.round(atob(base64).length / 1024);
  toast(`Uploading ${sizeKB}KB…`);
  // Use .jpg extension if compressed to JPEG
  const finalPath = dataUrl.startsWith('data:image/jpeg') ? path.replace(/\.[^.]+$/, '.jpg') : path;
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({secret, file: finalPath, content: base64, raw: true, message: 'Admin: upload ' + finalPath})
    });
    const data = await res.json();
    if (!data.ok) { toast('Upload failed: ' + (data.error||'unknown'), 'err'); return null; }
    return '/' + finalPath;
  } catch(e) { toast('Upload error: ' + e.message, 'err'); return null; }
}

async function updateProductPageImage(p) {
  const slug = p.id;
  try {
    const res = await fetch('https://raw.githubusercontent.com/go5-tech/kgpeps/main/' + slug + '/index.html?t=' + Date.now());
    if (!res.ok) return; // page doesn't exist, skip
    let html = await res.text();
    // Update main img src inside pd-img-wrap
    const newImg = p.img || '';
    html = html.replace(/(<img\s[^>]*alt="[^"]*–\s*Peptide Central India"[^>]*>)/, function(m) {
      return m.replace(/src="[^"]*"/, 'src="' + newImg + '"');
    });
    html = html.replace(/src="[^"]*"([^>]*alt="[^"]*–\s*Peptide Central India")/, 'src="' + newImg + '"$1');
    // Update _pimg in inline script
    const varImg = (p.variants && p.variants[0] && p.variants[0].img) || newImg;
    html = html.replace(/_pimg="[^"]*"/, '_pimg="' + varImg.replace(/"/g,'\\"') + '"');
    // Update _pdv in inline script
    const pdvJson = JSON.stringify((p.variants||[]).map(function(v){ return {mg:v.mg,price:v.price,origPrice:v.origPrice,img:v.img||newImg}; }));
    html = html.replace(/_pdv=\[[\s\S]*?\](?=,_pdn)/, '_pdv=' + pdvJson);
    const data = await commitFile(slug + '/index.html', html, 'Admin: sync ' + slug + ' page image');
    if (!data.ok) toast('Page sync failed for ' + p.name, 'err');
  } catch(e) { toast('Page sync error: ' + e.message, 'err'); }
}

async function commitFile(filePath, content, message) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({secret, file: filePath, content, message})
  });
  return res.json();
}

async function saveAll() {
  const btn = document.querySelector('.btn-success');
  btn.textContent = 'Saving…';
  btn.disabled = true;
  try {
    // Generate pages for new products first
    const newProducts = products.filter(p => p._isNew);
    for (const p of newProducts) {
      toast(`Creating page for ${p.name}…`);
      const html = generateProductPage(p);
      const data = await commitFile(p.id + '/index.html', html, 'Admin: add product page ' + p.id);
      if (!data.ok) {
        toast('Page create failed for ' + p.name + ': ' + (data.error || 'unknown'), 'err');
        btn.textContent = '💾 Save All Changes';
        btn.disabled = false;
        return;
      }
      delete p._isNew;
    }

    // Update HTML for products whose image changed
    for (const p of products) {
      if (p._isNew) continue;
      const orig = _origImages[p.id];
      if (!orig) continue;
      const imgChanged = p.img !== orig.img;
      const varImgChanged = (p.variants||[]).some((v,i) => (v.img||'') !== (orig.variants[i]||''));
      if (imgChanged || varImgChanged) {
        toast('Syncing ' + p.name + ' page…');
        await updateProductPageImage(p);
        _origImages[p.id] = { img: p.img||'', variants: (p.variants||[]).map(v => v.img||'') };
      }
    }

    // Save products.json
    const content = JSON.stringify(products, null, 2);
    const data = await commitFile('products.json', content, 'Admin: update products');
    if (data.ok) {
      toast('Saved successfully!' + (newProducts.length ? ' ' + newProducts.length + ' new page(s) created.' : ''), 'ok');
      document.getElementById('save-status').textContent = 'Saved ' + new Date().toLocaleTimeString();
      document.getElementById('save-status').style.color = '#16a34a';
    } else {
      toast('Save failed: ' + (data.error || 'unknown'), 'err');
    }
  } catch(e) {
    toast('Save failed: ' + e.message, 'err');
  }
  btn.textContent = '💾 Save All Changes';
  btn.disabled = false;
}

function deleteProduct(i) {
  if (!confirm('Delete "' + products[i].name + '"? This cannot be undone until you save.')) return;
  products.splice(i, 1);
  renderList();
  markUnsaved();
}

function markUnsaved() {

}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.className = 'toast'; }, 3000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openChangePwd() { document.getElementById('pwd-modal').classList.add('open'); }
function closeChangePwd() { document.getElementById('pwd-modal').classList.remove('open'); document.getElementById('new-pwd').value=''; document.getElementById('confirm-pwd').value=''; }
async function confirmChangePwd() {
  const np = document.getElementById('new-pwd').value;
  const cp = document.getElementById('confirm-pwd').value;
  if (np.length < 8) { toast('Password must be at least 8 characters', 'err'); return; }
  if (np !== cp) { toast('Passwords do not match', 'err'); return; }
  const btn = document.querySelector('#pwd-modal .btn-primary');
  btn.textContent = 'Updating…'; btn.disabled = true;
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({secret, action: 'changePassword', newSecret: np})
    });
    const data = await res.json();
    if (data.ok) {
      secret = np;
      sessionStorage.setItem('adm_s', np);
      closeChangePwd();
      toast('Password updated!', 'ok');
    } else {
      toast('Failed: ' + (data.error || 'unknown'), 'err');
    }
  } catch(e) { toast('Error: ' + e.message, 'err'); }
  btn.textContent = 'Update Password'; btn.disabled = false;
}

  sessionStorage.removeItem('adm_s');

}
